          "description": "Le programme Taechir est la plateforme officielle du Ministère de l'Emploi marocain permettant aux entreprises de déposer et suivre leurs demandes de visa de contrat de travail pour salariés étrangers.",
          "provider": {
            "@type": "GovernmentOrganization",
            "name": "Ministère de l'Inclusion Économique, de la Petite Entreprise, de l'Emploi et des Compétences – Maroc"
          },
          "areaServed": {
            "@type": "Country",

        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Qu'est-ce que la plateforme TAECHIR ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "TAECHIR est le système informatique officiel du Ministère de l'Inclusion Économique, de la Petite Entreprise, de l'Emploi et des Compétences. Il permet aux employeurs de formuler et suivre leurs demandes de visa de contrat de travail pour les salariés étrangers de manière dématérialisée."
              }
            },
            {
              "@type": "Question",
              "name": "Quelles sont les nationalités dispensées de l'attestation ANAPEC ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Les ressortissants des pays ayant conclu une convention d'établissement avec le Maroc sont dispensés de l'attestation d'activité ANAPEC. Cela concerne explicitement les ressortissants de l'Algérie, de la Tunisie et du Sénégal. D'autres catégories sont également dispensées : salariés CFC (Casablanca Finance City), époux/épouses de ressortissants marocains, profils rares (listes A1/A2 de l'ANAPEC), gérants, associés et actionnaires d'entreprise."
              }
            },
            {
              "@type": "Question",
              "name": "Combien de temps prend la procédure Taechir ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Le délai total dépend du profil du salarié. Pour un profil standard, l'attestation ANAPEC prend jusqu'à 20 jours ouvrables, auxquels s'ajoutent jusqu'à 10 jours pour le visa du Ministère, soit environ 30 jours au total. Pour un profil rare (listes A1/A2) ou un renouvellement, l'ANAPEC traite en 48h, soit environ 12 jours au total. Les salariés dispensés d'ANAPEC (Algérie, Tunisie, Sénégal, CFC, époux de marocain...) bénéficient uniquement du délai visa de 10 jours."
              }
            },
            {
              "@type": "Question",
              "name": "Quel est le coût exact de la procédure Taechir ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "La plateforme TAECHIR et le visa du Ministère sont gratuits. Les frais sont ceux de l'ANAPEC (si vous n'êtes pas dispensé) : 5 000 Dhs HT pour le premier dossier (avec annonce obligatoire de 20 jours), 1 500 Dhs HT pour chaque dossier supplémentaire du même poste (plafonné à 5 par an), et 1 500 Dhs HT pour les profils rares ou les renouvellements (sans obligation d'annonce, traitement en 48h)."
              }
            },
            {
              "@type": "Question",
              "name": "Le salarié étranger peut-il commencer à travailler avant d'obtenir le visa Taechir ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Non. Conformément à l'article 516 du Code du Travail marocain, tout employeur désireux de recruter un salarié étranger doit obtenir l'autorisation (visa) avant que celui-ci ne commence à travailler. La date du visa est la date à laquelle le contrat prend effet."
              }
            },
            {
              "@type": "Question",
              "name": "Que se passe-t-il en cas de refus du visa de travail Taechir ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "En cas de refus du visa du contrat de travail, l'employeur s'engage à prendre en charge les frais de rapatriement du salarié étranger vers son pays d'origine ou son pays de résidence (Article 5 du contrat type)."
              }
            },
            {
              "@type": "Question",
              "name": "Comment se passe le renouvellement du contrat de travail d'un étranger au Maroc ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "La demande de renouvellement est introduite sur la plateforme TAECHIR. Si le salarié reste chez le même employeur au même poste, la procédure est simplifiée : délai ANAPEC réduit à 48h et frais de 1 500 Dhs HT. Le dossier physique nécessitera notamment les 3 derniers mois de déclarations CNSS et la copie de la carte de séjour."
              }
            },
            {
              "@type": "Question",
              "name": "Un salarié étranger peut-il changer d'employeur au Maroc ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Oui, mais il s'agit d'une nouvelle procédure de demande de visa (\"Changement d'employeur\") sur Taechir. Le nouvel employeur devra fournir une lettre de résiliation de l'ex-employeur, une lettre de démission légalisée, ou une décision judiciaire en cas de litige, en plus des documents habituels."
              }
            },
            {
              "@type": "Question",
              "name": "Les listes A1 et A2 de l'ANAPEC (profils rares) sont-elles fixes ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Non, les listes A1 (Haut niveau) et A2 (Profils pointus rares) sont mises à jour régulièrement par l'ANAPEC en concertation avec le Ministère chargé du Travail, en fonction de l'évolution et des besoins réels du marché de l'emploi au Maroc."
              }
            }
          ]
