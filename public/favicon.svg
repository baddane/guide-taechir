<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Moroccan red background -->
  <rect width="32" height="32" rx="7" fill="#C1272D"/>

  <!-- Passport / document booklet -->
  <rect x="7" y="5" width="18" height="23" rx="2.5" fill="white"/>

  <!-- Moroccan 5-pointed star (green, centered at 16,13.5, R=4.2 r=1.8) -->
  <path d="M16,9.3 L17.05,12.2 L19.98,12.3 L17.72,14.1 L18.58,17.0 L16,15.3 L13.42,17.0 L14.28,14.1 L12.02,12.3 L14.95,12.2 Z" fill="#006233"/>

  <!-- Document lines (subtle) -->
  <rect x="10" y="20" width="12" height="1.2" rx="0.6" fill="#C1272D" opacity="0.25"/>
  <rect x="10" y="22.5" width="8.5" height="1.2" rx="0.6" fill="#C1272D" opacity="0.25"/>
</svg>
